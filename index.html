<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Web3 Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-black text-white font-mono">

<header class="border-b border-white p-3 flex justify-between items-center">
  <h1 class="text-xl">Web3 Portfolio</h1>
  <button id="connectBtn" class="border border-white px-3 py-1">Connect Wallet</button>
</header>

<!-- Wallet Info -->
<div id="walletInfo" class="p-3 border-b border-white"></div>

<!-- Top Chart Section -->
<section class="border-b border-white p-3">
  <div class="flex justify-between items-center">
    <p>Select coins to monitor price trends (up to 3):</p>
    <select id="globalTimeframe" class="bg-black text-white border border-white ml-2">
      <option value="7" selected>7d</option>
      <option value="30">30d</option>
      <option value="90">90d</option>
    </select>
  </div>
  <div class="mt-2">
    <select id="coinSelector" class="mr-2 bg-black text-white border border-white"></select>
    <button id="addChartBtn" class="border border-white px-3 py-1">ADD</button>
  </div>
  <div id="topCharts" class="grid grid-cols-1 md:grid-cols-3 gap-2 mt-3"></div>
</section>

<!-- Ratios -->
<section class="border-b border-white p-3">
  <h2 class="text-lg mb-2">Key Ratios</h2>
  <div id="pinnedRatios" class="grid grid-cols-1 md:grid-cols-3 gap-2 mb-4"></div>
  <div id="allRatios" class="flex flex-wrap gap-2"></div>
</section>

<!-- Market Table -->
<section class="p-3">
  <table class="w-full border-collapse">
    <thead>
      <tr class="border-b border-white">
        <th class="text-left p-2">Coin</th>
        <th class="text-right p-2">Price</th>
        <th class="text-right p-2">24h%</th>
        <th class="text-right p-2">Mcap</th>
      </tr>
    </thead>
    <tbody id="priceTable"></tbody>
  </table>
</section>

<!-- Modal Chart -->
<div id="chartModal" class="hidden fixed inset-0 bg-black/90 flex justify-center items-center z-50">
  <div class="bg-black text-white p-4 border border-white w-11/12 max-w-4xl h-5/6 flex flex-col">
    <button id="closeModal" class="border border-white px-2 py-1 self-end mb-2">Close</button>
    <h2 id="chartTitle" class="text-cyan-400 mb-2"></h2>
    <select id="modalTimeframe" class="bg-black text-white border border-white mb-2 w-32">
      <option value="7">7d</option>
      <option value="30" selected>30d</option>
      <option value="90">90d</option>
      <option value="180">180d</option>
      <option value="365">1y</option>
    </select>
    <canvas id="coinChart" class="flex-1"></canvas>
  </div>
</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
